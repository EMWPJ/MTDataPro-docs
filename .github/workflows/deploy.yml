name: Build and Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build HTML
        run: sphinx-build -b html source _build/html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            latexmk \
            fonts-noto-cjk
        timeout-minutes: 25
      - name: Build PDF
        run: |
          xelatex -version
          sphinx-build -b latex source _buildlatex
          cd _buildlatex
          latexmk -pdf -file-line-error -interaction=nonstopmode mtdatapro.tex
        timeout-minutes: 20
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: mtdatapro-pdf
          path: _buildlatex/mtdatapro.pdf
