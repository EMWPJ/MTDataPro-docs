name: Release Documentation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-docx

      - name: Build HTML
        env:
          CI: 'true'
        run: |
          sphinx-build -b html source _build/html

      - name: Build PDF with XeLaTeX
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: '2025'
          scheme: 'full'
        env:
          CI: 'true'
        run: |
          sphinx-build -b latex source _buildlatex
          cd _buildlatex
          latexmk -pdf -f -file-line-error -interaction=nonstopmode mtdatapro.tex
        timeout-minutes: 30

      - name: Build DOCX
        env:
          CI: 'true'
        run: |
          python scripts/html_to_docx.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag: ${{ github.ref_name }}
          name: MTDataPro 中文手册 ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            _build/docx/mtdatapro.docx
            _buildlatex/mtdatapro.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
